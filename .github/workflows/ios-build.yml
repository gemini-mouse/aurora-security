name: iOS Xcode Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    name: Build AuroraSecurity for iOS Simulator
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      XCODE_PROJECT: ios/AuroraSecurity/AuroraSecurity.xcodeproj
      XCODE_TARGET: AuroraSecurity
      INFOPLIST: ios/AuroraSecurity/AuroraSecurity/Info.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun simctl list runtimes

      - name: Validate iOS project files
        run: |
          test -d "$XCODE_PROJECT"
          test -f "$XCODE_PROJECT/project.pbxproj"
          test -f "$INFOPLIST"
          plutil -lint "$INFOPLIST"
          xcodebuild -list -project "$XCODE_PROJECT"

      - name: Build Debug for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -target "$XCODE_TARGET" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee xcodebuild.log

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
